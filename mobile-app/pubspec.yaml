name: scamshield_app
description: Mobile-first smishing detection for South Africa (ISJ107V).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "branding/icon-1024.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "branding/icon-foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1B5E20"
  image: branding/icon-foreground.png
  android: true
  ios: false

flutter:
  uses-material-design: true
